[platformio]
default_envs = m5stick-c-plus

[env:m5stick-c-plus]
platform = espressif32@^6.5.0
board = m5stick-c
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D ARDUINO_M5StickC_Plus
    -D SG_BOARD_PLUS
    -std=gnu++17
    -Wall -Wswitch-enum
    ; strip local build-machine paths out of the compiled binary
    -ffile-prefix-map=${platformio.core_dir}=pio
    -fmacro-prefix-map=${platformio.core_dir}=pio
lib_deps =
    m5stack/M5Unified@^0.2.14

[env:diag]
extends = env:m5stick-c-plus
build_src_filter = -<*> +<diag_main.cpp>
build_flags =
    ${env:m5stick-c-plus.build_flags}
    -D DIAG_BUILD

[env:m5stick-c-plus2]
platform = espressif32@^6.5.0
board = esp32dev            ; generic ESP32 base — keeps M5GFX board seed at 0 so Plus2 autodetects
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D SG_BOARD_PLUS2
    -std=gnu++17
    -Wall -Wswitch-enum
    -ffile-prefix-map=${platformio.core_dir}=pio
    -fmacro-prefix-map=${platformio.core_dir}=pio
lib_deps =
    m5stack/M5Unified@^0.2.14

[env:m5stick-s3]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1  ; generic ESP32-S3 base — keeps M5GFX board seed at 0 so StickS3 autodetects
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D SG_BOARD_S3
    -D ARDUINO_USB_CDC_ON_BOOT=1   ; StickS3 serial monitor runs over native USB-CDC
    -std=gnu++17
    -Wall -Wswitch-enum
    -ffile-prefix-map=${platformio.core_dir}=pio
    -fmacro-prefix-map=${platformio.core_dir}=pio
lib_deps =
    m5stack/M5Unified@^0.2.14

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -D UNIT_TEST
    -Wall -Wextra
    -I include
test_build_src = yes
